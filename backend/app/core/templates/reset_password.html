<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9;padding:40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);padding:36px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:26px;font-weight:600;">密码重置</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;color:#333;font-size:16px;line-height:1.6;">
                你好，<strong>{{username}}</strong>
              </p>
              <p style="margin:0 0 16px;color:#555;font-size:15px;line-height:1.8;">
                我们收到了你的密码重置请求。请使用以下验证码完成密码重置：
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 24px;">
                <tr>
                  <td style="background-color:#f8f9fa;border:2px dashed #ddd;border-radius:8px;padding:16px 40px;text-align:center;">
                    <span style="font-size:28px;font-weight:700;letter-spacing:6px;color:#333;">{{token}}</span>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 16px;color:#555;font-size:15px;line-height:1.8;">
                此验证码将在 <strong>30 分钟</strong>后过期。如果你没有请求密码重置，请忽略此邮件。
              </p>
              <p style="margin:0;color:#999;font-size:13px;line-height:1.6;">
                ⚠️ 请勿将验证码分享给任何人。{{project_name}} 工作人员不会向你索取验证码。
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;background-color:#fafafa;border-top:1px solid #eee;text-align:center;">
              <p style="margin:0;color:#999;font-size:13px;">
                此邮件由 {{project_name}} 系统自动发送，请勿直接回复。
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
