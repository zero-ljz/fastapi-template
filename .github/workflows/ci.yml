name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run tests
        run: python -m pytest -q

  migrations:
    name: MySQL migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test-password
          MYSQL_DATABASE: fastapi_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ENVIRONMENT: testing
      DEBUG: "false"
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      DB_DRIVER: mysql+mysqldb
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: test-password
      DB_NAME: fastapi_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev pkg-config

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Upgrade database
        run: python -m alembic upgrade head

      - name: Check model and migration consistency
        run: python -m alembic check

      - name: Verify reversible migrations
        run: |
          python -m alembic downgrade base
          python -m alembic upgrade head

  container:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - quality
      - migrations

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --tag fastapi-template:ci backend
