name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -q

      - name: Check exported OpenAPI document
        run: |
          uv run python scripts/export_openapi.py ../frontend/openapi.json
          git diff --exit-code -- ../frontend/openapi.json

  frontend:
    name: Frontend quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated API types
        run: |
          npm run api:types
          git diff --exit-code -- src/api/schema.d.ts

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  migrations:
    name: MySQL migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test-password
          MYSQL_DATABASE: fastapi_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptest-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ENVIRONMENT: testing
      DEBUG: "false"
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      DB_DRIVER: mysql+mysqldb
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: test-password
      DB_NAME: fastapi_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev pkg-config

      - name: Install dependencies
        run: uv sync --locked --no-dev

      - name: Upgrade database
        run: uv run alembic upgrade head

      - name: Check model and migration consistency
        run: uv run alembic check

      - name: Verify reversible migrations
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head

  backend-container:
    name: Backend container build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - quality
      - migrations

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --tag fastapi-template:ci backend

  frontend-container:
    name: Frontend container build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --tag fastapi-template-frontend:ci frontend
